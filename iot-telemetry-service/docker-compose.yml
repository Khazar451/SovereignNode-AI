version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# SovereignNode – IoT Telemetry Service: Local Dev Infrastructure Stack
#
# Starts MongoDB and RabbitMQ with sane defaults so the Spring Boot service
# can run locally against real infrastructure (not mocks).
#
# Usage:
#   docker compose up -d       # start infra
#   mvn spring-boot:run        # start Spring Boot app (separate terminal)
#   docker compose down -v     # tear down + remove volumes
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── MongoDB 7.0 ─────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: telemetry-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: telemetry_db
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── RabbitMQ 3.13 (with Management UI) ─────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: telemetry-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"    # AMQP port
      - "15672:15672"  # Management UI → http://localhost:15672 (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Optional: Mongo Express (lightweight Mongo UI) ──────────────────────────
  mongo-express:
    image: mongo-express:1.0.2
    container_name: telemetry-mongo-express
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    profiles:
      - ui   # Start with: docker compose --profile ui up -d

volumes:
  mongo_data:
    name: telemetry_mongo_data
  rabbitmq_data:
    name: telemetry_rabbitmq_data
